name: Foundation validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  foundation:
    name: Validate repository foundation
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        # 固定 actions/checkout v7.0.0。
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Validate foundation
        run: ./tools/check-foundation.sh
